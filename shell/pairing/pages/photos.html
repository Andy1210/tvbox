<!doctype html>
<html lang="{{lang}}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{title}}</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        background: #0b0f14;
        color: #f4f6fa;
        font:
          16px/1.5 system-ui,
          sans-serif;
        padding: 24px;
        max-width: 520px;
        margin: auto;
      }
      h1 {
        font-size: 20px;
      }
      p {
        color: #aab4c2;
        font-size: 14px;
      }
      .btn {
        display: block;
        text-align: center;
        padding: 16px;
        border-radius: 12px;
        background: #1f6feb;
        color: #fff;
        font-size: 17px;
        font-weight: 700;
        margin-top: 16px;
      }
      #st {
        margin-top: 16px;
        text-align: center;
        font-size: 15px;
        color: #7d8a99;
      }
      h2 {
        font-size: 15px;
        color: #aab4c2;
        margin: 28px 0 10px;
        font-weight: 600;
      }
      #empty {
        color: #7d8a99;
        font-size: 14px;
      }
      #grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }
      .cell {
        position: relative;
        aspect-ratio: 1/1;
        border-radius: 10px;
        overflow: hidden;
        background: #161b22;
      }
      .cell img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .cell button {
        position: absolute;
        top: 5px;
        right: 5px;
        width: 30px;
        height: 30px;
        border: 0;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.6);
        color: #fff;
        font-size: 16px;
        line-height: 30px;
        padding: 0;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>{{title}}</h1>
    <p>{{hint}}</p>
    <input id="code" type="hidden" />
    <label class="btn" for="f">{{pick}}</label>
    <input id="f" type="file" accept="image/*" multiple style="display: none" />
    <div id="st"></div>
    <h2>{{current}}</h2>
    <div id="empty" style="display: none">{{empty}}</div>
    <div id="grid"></div>
    <script>
      document.getElementById("code").value = new URLSearchParams(location.search).get("c") || "";
      function code() {
        return document.getElementById("code").value;
      }
      var st = document.getElementById("st"),
        grid = document.getElementById("grid"),
        empty = document.getElementById("empty");
      function q(p) {
        return p + (p.indexOf("?") < 0 ? "?" : "&") + "c=" + encodeURIComponent(code());
      }
      async function load() {
        try {
          var r = await fetch(q("/photos"));
          var names = (await r.json()).names || [];
        } catch (_) {
          return;
        }
        grid.innerHTML = "";
        empty.style.display = names.length ? "none" : "block";
        names.forEach(function (n) {
          var cell = document.createElement("div");
          cell.className = "cell";
          var img = document.createElement("img");
          img.src = q("/photo-img") + "&name=" + encodeURIComponent(n);
          img.loading = "lazy";
          var b = document.createElement("button");
          b.textContent = "✕";
          b.title = "{{del}}";
          b.onclick = async function () {
            if (!confirm("{{delConfirm}}")) return;
            try {
              await fetch("/photo-delete", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ code: code(), name: n }),
              });
            } catch (_) {}
            load();
          };
          cell.appendChild(img);
          cell.appendChild(b);
          grid.appendChild(cell);
        });
      }
      function resize(file) {
        return new Promise(function (res) {
          var img = new Image(),
            url = URL.createObjectURL(file);
          img.onload = function () {
            var m = 1920,
              w = img.width,
              h = img.height;
            if (w > m || h > m) {
              if (w >= h) {
                h = Math.round((h * m) / w);
                w = m;
              } else {
                w = Math.round((w * m) / h);
                h = m;
              }
            }
            var c = document.createElement("canvas");
            c.width = w;
            c.height = h;
            c.getContext("2d").drawImage(img, 0, 0, w, h);
            URL.revokeObjectURL(url);
            res(c.toDataURL("image/jpeg", 0.82));
          };
          img.onerror = function () {
            URL.revokeObjectURL(url);
            res(null);
          };
          img.src = url;
        });
      }
      document.getElementById("f").addEventListener("change", async function (e) {
        var files = Array.prototype.slice.call(e.target.files || []),
          ok = 0;
        for (var i = 0; i < files.length; i++) {
          st.textContent = "{{uploading}} " + (i + 1) + "/" + files.length + "…";
          var data = await resize(files[i]);
          if (!data) continue;
          try {
            var r = await fetch("/photo" + location.search, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ code: code(), name: files[i].name, data: data }),
            });
            if (r.ok) ok++;
          } catch (_) {}
        }
        st.textContent = ok + "/" + files.length + " ✓ " + "{{done}}";
        e.target.value = "";
        load();
      });
      load();
    </script>
  </body>
</html>
